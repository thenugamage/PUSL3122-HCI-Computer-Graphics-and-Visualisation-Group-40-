version: "3.9"

services:
  room-visualizer:
    build:
      context: .
      dockerfile: Dockerfile
    image: furniture-room-visualizer:latest
    container_name: room-visualizer

    # ── GUI / Display ──────────────────────────────────────────────────────
    # On Linux: share the host X11 socket so the Swing window appears
    # On Windows: use an X server like VcXsrv or X410, set DISPLAY=host.docker.internal:0.0
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0.0}

    volumes:
      # X11 socket (Linux only — comment out on Windows)
      - /tmp/.X11-unix:/tmp/.X11-unix:ro

      # Persist the SQLite database across container restarts
      - ./data:/app/data

      # Mount OAuth credentials (gitignored — must exist locally)
      - ./google_oauth.properties:/app/data/google_oauth.properties:ro

    network_mode: host   # Needed on Linux for X11; change to 'bridge' on Windows
