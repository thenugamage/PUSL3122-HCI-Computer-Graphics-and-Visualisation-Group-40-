services:
  room-visualizer:
    build:
      context: .
      dockerfile: Dockerfile
    image: furniture-room-visualizer:latest
    container_name: room-visualizer

    environment:
      # Windows: requires VcXsrv or X410 running on the host
      # Set DISPLAY=:0 on Linux instead
      - DISPLAY=host.docker.internal:0.0
      # Tells DatabaseConfig where to write the SQLite database
      - APP_DATA_DIR=/app/data

    volumes:
      # Persist the SQLite database across container restarts
      - ./data:/app/data

      # Mount OAuth credentials (gitignored — must exist locally)
      - ./google_oauth.properties:/app/google_oauth.properties:ro

    # extra_hosts lets the container resolve 'host.docker.internal' (auto on Windows)
    extra_hosts:
      - "host.docker.internal:host-gateway"

