name: Build and Package

on:
  push:
    branches: [ sachini, development ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Package with jpackage (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        jpackage --type exe --input target/ --name "LankaFurnitureVisualizer" --main-jar furniture-room-visualizer-1.0-SNAPSHOT.jar --main-class com.capitalcarrier.roomvisualizer.App

    - name: Package with jpackage (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        jpackage --type dmg --input target/ --name "LankaFurnitureVisualizer" --main-jar furniture-room-visualizer-1.0-SNAPSHOT.jar --main-class com.capitalcarrier.roomvisualizer.App

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-package
        path: |
          *.exe
          *.dmg
          *.msi
